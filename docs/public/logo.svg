<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="rulvar">
  <defs>
    <!-- userSpaceOnUse: an objectBoundingBox gradient degenerates to
         nothing on the zero-width bounding box of the vertical stem. -->
