# Live adapter contract tests (M5-T04; docs/11, section "Live contract
# tests (cron)"; docs/13, section "CI workflow spec").
#
# Weekly cron, NON-BLOCKING for merges: provider drift turns THIS run red
# and opens an issue; it never turns a PR red and never rerecords
# automatically (rerecording is a deliberate fixtures update). The job is
# gated on the CONTRACT_TESTS_ENABLED repository variable and on provider
# keys in repository secrets; spend and key custody are the founder
# budget item (docs/14, section "Founder-only decisions"). Until keys and
# provider cassettes exist, an enabled run reports "nothing to test" and
# exits green.
name: Contract tests (live)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  contract:
    name: Live adapter contract tests
    if: vars.CONTRACT_TESTS_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm exec turbo build
      - name: Replay provider cassettes against live APIs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/contract-tests.mjs
      - name: Page on drift (issue, never a silent rerecord)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Live adapter contract tests failed (provider drift?)';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'contract-drift',
            });
            const body = `The scheduled live contract run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPer docs/11 section 5.3 this means provider drift (fix the adapter, rerecord deliberately) or a flaky provider surface (document and quarantine). Automatic rerecording is forbidden.`;
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['contract-drift'],
              });
            }
