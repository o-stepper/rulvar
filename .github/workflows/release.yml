# Release pipeline (M0-T06; docs/12, section "Release pipeline").
#
# changesets/action maintains the standing "Version Packages" PR; merging it
# publishes via npm trusted publishing (OIDC): id-token: write, no long-lived
# npm tokens, automatic provenance once the repository is public. Publishing
# uses `pnpm publish -r`, which rewrites workspace:* and catalog: ranges at
# pack time. The pnpm version comes from the root packageManager pin, which
# is the known-good pin required by the risk register (docs/13, section
# "Risk register": early pnpm 11.0.x OIDC regression).
name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version packages or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo build
      # A push with no pending changesets is publish-shaped (the merge
      # of a Version Packages PR): run the full test suite once more as
      # the release's own gate, instead of relying on branch protection
      # alone. Pushes that still carry changesets only refresh the
      # Version Packages PR and are already covered by the CI workflow.
      - name: Test before a publish-shaped push
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -v README >/dev/null; then
            echo "pending changesets present; version PR path, tests covered by CI"
          else
            pnpm exec vitest run
          fi
      # `version` routes through the root `version-packages` script (a
      # package.json script, so the `&&` chain runs in a real shell):
      # after `changeset version` rewrites manifests and changelogs it
      # syncs the bare pointer package and regenerates the committed
      # docs (docs/reference/changelog.md and the stamped version
      # prose), so the standing Version Packages PR passes the docs
      # freshness gate without manual fixups.
      - name: Create Version Packages PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'Version packages'
          title: 'Version Packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # One v-prefixed tag and one GitHub release per train, named after
      # the umbrella's version (the fixed group shares it). The gate is
      # the REGISTRY, not the action's `published` output: changesets/
      # action only recognizes its own `changeset publish` output, and
      # this repo publishes with `pnpm publish -r`. Idempotent: runs on
      # every main push and skips whatever already exists.
      #
      # The registry is eventually consistent on READS, so the gate polls.
      # It used to check once and exit early, which on the 1.5.0 train
      # read "not on the registry yet" seconds after the publish step had
      # published it, silently shipping a release with no tag. Skipping
      # early is only correct when the tag ALREADY exists (an ordinary
      # main push); a missing tag for an unseen version means wait.
      - name: Tag and create the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./packages/rulvar/package.json').version")"
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists; nothing to tag"
          else
            live=""
            for attempt in $(seq 1 12); do
              if npm view "@rulvar/rulvar@${version}" version >/dev/null 2>&1; then
                live=1
                break
              fi
              echo "@rulvar/rulvar@${version} is not visible yet (attempt ${attempt}/12); waiting for the registry read path"
              sleep 5
            done
            if [ -z "${live}" ]; then
              echo "::error title=release not tagged::@rulvar/rulvar@${version} never became visible on the registry; publish it, then re-run this job."
              exit 1
            fi
            git tag "${tag}"
            git push origin "${tag}"
          fi
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" \
              --notes "Changelog: https://docs.rulvar.com/reference/changelog"
          fi
