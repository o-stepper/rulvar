# Release pipeline (M0-T06; docs/12, section "Release pipeline").
#
# changesets/action maintains the standing "Version Packages" PR; merging it
# publishes via npm trusted publishing (OIDC): id-token: write, no long-lived
# npm tokens, automatic provenance once the repository is public. Publishing
# uses `pnpm publish -r`, which rewrites workspace:* and catalog: ranges at
# pack time. The pnpm version comes from the root packageManager pin, which
# is the known-good pin required by the risk register (docs/13, section
# "Risk register": early pnpm 11.0.x OIDC regression).
name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version packages or publish
    runs-on: ubuntu-latest
    steps:
      # The token here is what actually matters, and it is easy to get
      # wrong: giving RELEASE_PAT to the changesets action alone only
      # changes the token its API calls use. The `git push` of the
      # changeset-release/main branch runs under the credentials
      # actions/checkout persisted, so with a plain checkout the branch is
      # still pushed as GITHUB_TOKEN, GitHub still refuses to trigger
      # workflows for it, and the Version Packages PR is still born with
      # no checks. Checkout must hold the PAT too.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo build
      # A push with no pending changesets is publish-shaped (the merge
      # of a Version Packages PR): run the full test suite once more as
      # the release's own gate, instead of relying on branch protection
      # alone. Pushes that still carry changesets only refresh the
      # Version Packages PR and are already covered by the CI workflow.
      - name: Test before a publish-shaped push
        id: shape
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -v README >/dev/null; then
            echo "pending changesets present; version PR path, tests covered by CI"
            echo "publish_shaped=false" >> "$GITHUB_OUTPUT"
          else
            pnpm exec vitest run
            echo "publish_shaped=true" >> "$GITHUB_OUTPUT"
          fi
      # A release must never ship a compat whose pack drifted from the
      # published artifact of the same version (v1.16.1 review P3);
      # registry mode also re-verifies the committed canonical manifest
      # against npm itself before anything publishes.
      - name: Compat artifact immutability (registry mode)
        run: node scripts/compat-immutability.mjs --registry
      # `version` routes through the root `version-packages` script (a
      # package.json script, so the `&&` chain runs in a real shell):
      # after `changeset version` rewrites manifests and changelogs it
      # syncs the bare pointer package and regenerates the committed
      # docs (docs/reference/changelog.md and the stamped version
      # prose), so the standing Version Packages PR passes the docs
      # freshness gate without manual fixups.
      #
      # The token is RELEASE_PAT when it exists. GitHub does not trigger
      # workflows for pushes made with GITHUB_TOKEN, so under the default
      # token the Version Packages PR is born with no checks at all: it
      # cannot be reviewed by CI, and required status checks on main would
      # block every release forever. A PAT makes the action's push look
      # like a human's, so the release PR gets the same CI as any other.
      #
      # The fallback is deliberate and load-bearing: an expired or revoked
      # PAT degrades the release train back to "works, but the version PR
      # has no checks" instead of breaking it outright.
      - name: Create Version Packages PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'Version packages'
          title: 'Version Packages'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
      # One v-prefixed tag and one GitHub release per train, named after
      # the umbrella's version (the fixed group shares it). The gate is
      # the REGISTRY, not the action's `published` output: changesets/
      # action only recognizes its own `changeset publish` output, and
      # this repo publishes with `pnpm publish -r`. Idempotent: runs on
      # every main push and skips whatever already exists.
      #
      # The registry is eventually consistent on READS, so a publish-shaped
      # push POLLS for the version it just published, and fails loudly if it
      # never appears (checking once, as this did, silently shipped 1.5.0
      # with no tag and no pointer).
      #
      # The manifest version alone cannot tell the two paths apart: on a
      # VERSION-PR push the changesets action has already run
      # `version-packages` in THIS runner's tree, so the manifest reads the
      # NEXT version while nothing has been published. Polling for it would
      # wait a minute and then fail a perfectly healthy run. So the shape is
      # captured BEFORE the action consumes the changesets, and only a
      # publish-shaped push is allowed to wait or to fail.
      - name: Tag and create the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_SHAPED: ${{ steps.shape.outputs.publish_shaped }}
        run: |
          version="$(node -p "require('./packages/rulvar/package.json').version")"
          tag="v${version}"
          tagged=""
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists; nothing to tag"
            tagged=1
          elif [ "${PUBLISH_SHAPED}" != "true" ]; then
            echo "version PR path (changesets were pending at push): ${version} is the version the PR proposes, not a published one; nothing to tag"
          else
            live=""
            for attempt in $(seq 1 12); do
              if npm view "@rulvar/rulvar@${version}" version >/dev/null 2>&1; then
                live=1
                break
              fi
              echo "@rulvar/rulvar@${version} is not visible yet (attempt ${attempt}/12); waiting for the registry read path"
              sleep 5
            done
            if [ -z "${live}" ]; then
              echo "::error title=release not tagged::@rulvar/rulvar@${version} never became visible on the registry; publish it, then re-run this job."
              exit 1
            fi
            git tag "${tag}"
            git push origin "${tag}"
            tagged=1
          fi
          # The GitHub release still repairs idempotently on any push, but
          # only behind an EXISTING tag: a tag exists only for a version
          # that really shipped, so this can never mint a release for the
          # version a Version Packages PR merely proposes.
          if [ -n "${tagged}" ] && ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" \
              --notes "Changelog: https://docs.rulvar.com/reference/changelog"
          fi
