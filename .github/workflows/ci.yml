# CI pipeline (M0-T05; docs/13, section "CI workflow spec").
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, typecheck, lint (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo build
      - run: pnpm exec turbo typecheck
      - run: pnpm exec turbo lint
      - run: pnpm exec prettier --check .
      - name: Rolled-up .d.ts drift gate
        run: |
          node scripts/dts-baseline.mjs
          git diff --exit-code dts-rollup
          untracked="$(git status --porcelain -- dts-rollup)"
          if [ -n "$untracked" ]; then
            echo "$untracked"
            echo "::error title=dts-rollup has uncommitted rollups::A new package's public surface baseline must be committed (run node scripts/dts-baseline.mjs and commit dts-rollup)."
            exit 1
          fi
      - name: Changesets fixed-group check
        run: node scripts/check-fixed-group.mjs
      - name: Frozen-fixture write protection (M2-T12)
        run: node scripts/check-frozen-fixtures.mjs

  # The Version Packages PR is EXEMPT (its whole job is to consume the
  # changesets, so requiring one there is a contradiction), but the exempt
  # case reports SUCCESS rather than skipping the job. A required status
  # check is satisfied by a real conclusion; a skipped job is a
  # documented trap around required checks that nobody should have to
  # remember. Costing one runner minute per release train buys the
  # release path immunity from that whole class of question.
  changeset:
    name: Changeset presence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require a changeset for package changes
        run: |
          if [ "${{ github.head_ref }}" = "changeset-release/main" ]; then
            echo "Version Packages PR: the changesets are consumed here; requiring one would be a contradiction."
            exit 0
          fi
          pnpm exec changeset status --since=origin/${{ github.base_ref }}

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo build
      - run: pnpm exec vitest run

  # The complete defect cassette catalog in ONE job, replay-strict with
  # zero live calls (docs/09 section 6 rules; docs/10 M9 row; the 1.0
  # gate in docs/12 section 5). The audit asserts every docs/09 catalog
  # ID resolves to a fixture or a named suite before the replays run.
  cassette-catalog:
    name: Cassette catalog (replay-strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo build
      - run: node scripts/catalog-audit.mjs
      - run: >-
          pnpm exec vitest run
          packages/testing/src/cassettes
          packages/planner/src/m6-cassettes.test.ts
          packages/plan/src/m7-cassettes.test.ts
          packages/plan/src/m8-cassettes.test.ts
          packages/plan/src/m9-cassettes.test.ts
          packages/plan/src/m10-cassettes.test.ts
          packages/plan/src/m12-cassettes.test.ts
          packages/cli/src/m8-soak.test.ts
          examples/src/journals.test.ts

  # Exact runtime floor (the v1.16.1 review P2): published packages
  # declare engines.node >=22.12.0, but `node: 22` in the matrix means
  # the latest 22.x, and the pinned pnpm itself needs >=22.13, so the
  # floor was never actually executed. Bootstrap (install + build) runs
  # on Node 24; the suite then runs on the exact 22.12.0 binary invoked
  # directly (never through pnpm). node:sqlite needs the experimental
  # flag on 22.12 only, and it must arrive via NODE_OPTIONS: argv flags
  # do not propagate to the Vitest worker forks.
  test-node-floor:
    name: Test (exact Node 22.12.0 runtime floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo build
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Full suite on the exact floor binary
        env:
          NODE_OPTIONS: --experimental-sqlite
        run: |
          node --version
          test "$(node --version)" = "v22.12.0"
          node node_modules/vitest/vitest.mjs run

  # Optional and non-blocking per docs/13: Node 26 is Current, not LTS.
  test-node-26:
    name: Test (Node 26, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo build
      - run: pnpm exec vitest run

  pack-gates:
    name: publint + attw on packed tarballs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo pack-check
      - name: Compat artifact immutability gate (offline)
        run: node scripts/compat-immutability.mjs
      - name: Umbrella install smoke on packed tarballs
        run: node scripts/install-smoke.mjs

  # The pinned-pnpm bootstrap (v1.13 review P3-2): Turborepo spawns each
  # package task as `pnpm run <task>` resolved from PATH, so a stale
  # global pnpm earlier on PATH must not break the two supported entry
  # paths (CONTRIBUTING "Toolchain"). The trap step asserts the KNOWN
  # broken third path stays broken: a Corepack-launched root exports
  # COREPACK_ROOT to children, a differently versioned PATH pnpm then
  # refuses to self-switch, and every Turbo child dies on the version
  # mismatch. Both pnpm versions involved are pinned (the stale one by
  # this job, the target by packageManager), so this job only turns red
  # when the toolchain itself changes behavior - which is exactly when
  # the CONTRIBUTING note must be rewritten.
  bootstrap:
    name: Pinned pnpm bootstrap (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    steps:
      - uses: actions/checkout@v4
      # Deliberately NO pnpm/action-setup and no pnpm cache: the job
      # simulates a fresh machine whose only pnpm is a stale global.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Put a stale global pnpm first on PATH
        run: |
          npm install pnpm@11.1.2 --prefix "$RUNNER_TEMP/stale-pnpm"
          echo "$RUNNER_TEMP/stale-pnpm/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Direct pnpm self-switches to the pin (root and Turbo children)
        run: |
          pin="$(node -p "require('./package.json').packageManager.split('@')[1]")"
          command -v pnpm
          test "$(pnpm --version)" = "$pin"
          pnpm install --frozen-lockfile
          pnpm exec turbo run typecheck --filter=@rulvar/compat --force
      - name: Un-enabled corepack pnpm keeps failing in Turbo children (the documented trap)
        run: |
          if corepack pnpm exec turbo run typecheck --filter=@rulvar/compat --force; then
            echo "::error title=corepack pnpm now works without corepack enable::The COREPACK_ROOT child trap appears fixed upstream; update the CONTRIBUTING toolchain note and this job."
            exit 1
          fi
          echo "the un-enabled corepack path still fails in children, as documented"
      - name: Enabled Corepack shim first on PATH runs root and children on the pin
        run: |
          pin="$(node -p "require('./package.json').packageManager.split('@')[1]")"
          mkdir -p "$RUNNER_TEMP/corepack-bin"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin" pnpm
          export PATH="$RUNNER_TEMP/corepack-bin:$PATH"
          command -v pnpm | grep corepack-bin
          test "$(pnpm --version)" = "$pin"
          pnpm exec turbo run typecheck --filter=@rulvar/compat --force

  docs-lint:
    name: Docs conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/docs-lint.mjs
      # Repo scripts must work from a checkout path containing a space and
      # non-ASCII characters (URL.pathname regressions leave %20 in paths).
      # Runs the dependency-free read-only scripts from such a copy.
      - name: Scripts from a path with a space
        run: |
          dest="$RUNNER_TEMP/rulvar spåce test"
          mkdir -p "$dest"
          cp -R . "$dest"
          cd "$dest"
          node scripts/docs-lint.mjs
          node scripts/check-fixed-group.mjs
