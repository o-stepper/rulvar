name: Docs

# Docs build + link check is part of the per-commit signal so any
# regression in the docs pipeline (typedoc input, vitepress config,
# dependency updates feeding vite/esbuild, ...) is caught at PR time.
# The deploy job below stays gated on `main` - it publishes on a
# push/merge to `main` or a manual `workflow_dispatch` re-run, so PR
# runs only execute the build + link-check stages.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# The deploy job is gated on the `CLOUDFLARE_API_TOKEN` and
# `CLOUDFLARE_ACCOUNT_ID` repository secrets. Until those secrets are
# provisioned the deploy is a no-op and emits a warning. Provisioning
# order:
#
#   1. Create a Cloudflare Pages project named `rulvar-docs`.
#   2. Add the custom domain `docs.rulvar.com` on the Cloudflare side.
#   3. Provision repository secrets `CLOUDFLARE_API_TOKEN` (with the
#      "Pages: Edit" template) and `CLOUDFLARE_ACCOUNT_ID`.
#   4. Re-run the workflow from the Actions tab.

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build framework packages (typings for TypeDoc)
        run: pnpm exec turbo build

      - name: Build documentation site (sync + TypeDoc + VitePress + llms.txt)
        run: pnpm --filter @rulvar/docs run build:site
      # The raised chunkSizeWarningLimit must not hide search-index
      # growth (v1.16.1 review P4): fail on >10% regression over the
      # committed baseline, refreeze deliberately via --update.
      - name: Search index size budget
        run: node scripts/docs-search-budget.mjs
      # The path-keyed API sidebar split cut the build an order of
      # magnitude (v1.22.0 review P3-6); this budget keeps total raw,
      # total gzip, p95 page, and max page from silently regressing.
      - name: Docs output size budget
        run: node scripts/docs-size-budget.mjs
      # Every authored ts/js fence must parse as a standalone module
      # (v1.16.2 review P4-1): a copy/paste example is never a
      # syntactically incomplete fragment. Needs the installed
      # typescript, so it rides this job, not the dependency-free
      # docs-lint job.
      - name: Docs fence syntax gate
        run: node scripts/docs-fence-syntax.mjs

      - name: Per-page canonical and Open Graph URL
        run: pnpm docs:metadata

      # docs/api (the TypeDoc output), the aggregated changelog, the
      # synced contributing page, and the version prose stamped from the
      # package manifests (stamp-versions.mjs) are COMMITTED for GitHub
      # readers, code search, and LLM ingestion. build:site above just
      # regenerated all of them, so any diff or untracked page here means
      # the PR forgot the regeneration.
      - name: Generated docs freshness (regen + diff)
        run: |
          if ! git diff --exit-code --stat -- docs/api docs/guide docs/reference docs/contributing/index.md docs/index.md; then
            echo "--- first 200 lines of the content diff (for diagnosis) ---"
            git diff -- docs/api docs/guide docs/reference docs/contributing/index.md docs/index.md | head -200
            echo "::error title=generated docs are stale::Public API/TSDoc, a package changelog, CONTRIBUTING.md, or a stamped version changed without regenerating the committed docs. Run: pnpm --filter @rulvar/docs run clean && pnpm --filter @rulvar/docs run build:site, then commit the regenerated files."
            exit 1
          fi
          untracked="$(git status --porcelain -- docs/api)"
          if [ -n "$untracked" ]; then
            echo "$untracked"
            echo "::error title=docs/api has uncommitted pages::New generated pages must be committed (same regeneration command as above)."
            exit 1
          fi

      # --include-fragments makes lychee validate #anchors against the
      # target page's heading ids. The check runs in offline FILE mode,
      # not against a preview server: in file mode '#foo' resolves
      # against the containing file; --root-dir resolves the
      # site-root-relative hrefs VitePress emits under `cleanUrls: true`;
      # --fallback-extensions maps those extensionless URLs to their
      # backing .html files; --offline drops every remote target, which
      # keeps the link check network-free.
      - name: Link check (lychee, offline file mode)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --offline
            --include-fragments
            --root-dir ${{ github.workspace }}/docs/.vitepress/dist
            --fallback-extensions html
            ./docs/.vitepress/dist/**/*.html
          fail: true

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Deploy only from `main`, on either a real push/merge OR a manual
    # `workflow_dispatch` re-run from the Actions tab (the recovery path
    # the header comment + the "secrets not provisioned" step point to).
    # PR runs still build + link-check only.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # pnpm is needed for `pnpm dlx wrangler` below; the job never runs
      # `pnpm install`.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist

      - name: Skip deploy - Cloudflare secrets not provisioned yet
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "::warning title=Docs deploy skipped::Repository secrets CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID are not set. The build artefact is uploaded; once the secrets land, re-run this workflow to publish docs.rulvar.com."

      # A plain `pnpm dlx` call instead of cloudflare/wrangler-action:
      # the action's fallback install path runs a bare `pnpm add
      # wrangler` at the repo root, which pnpm 11 refuses inside a
      # workspace (ERR_PNPM_ADDING_TO_ROOT) regardless of the
      # ignore-workspace-root-check env hint. `pnpm dlx` installs into
      # a throwaway store and needs no workspace mutation; wrangler
      # reads CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID from the
      # job env natively. Version pinned to the one verified against
      # this project.
      - name: Publish to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: >-
          pnpm dlx wrangler@4.110.0 pages deploy docs/.vitepress/dist
          --project-name=rulvar-docs --branch=main
