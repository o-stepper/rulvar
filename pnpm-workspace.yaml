# Workspace and shared external versions (docs/13, section "Package manager:
# pnpm 11.x workspaces"). Shared external versions are pinned once here via
# the catalog: protocol so the 14 package.json files cannot drift apart.
packages:
  - packages/*
  - examples
  - docs

# esbuild's postinstall only validates that the platform binary from its
# optionalDependencies matches the package version; allowing it keeps the
# vitepress/vite toolchain in docs/ working out of the box.
allowBuilds:
  esbuild: true

catalog:
  '@ai-sdk/google': ^4.0.0
  '@ai-sdk/provider': ^4.0.0
  '@anthropic-ai/sdk': ^0.110.0
  '@modelcontextprotocol/sdk': ^1.29.0
  '@arethetypeswrong/cli': ^0.18.4
  '@changesets/cli': ^2.31.0
  '@eslint/js': ^9.39.4
  '@types/estree': ^1.0.6
  '@types/node': ^22.20.0
  '@vitest/coverage-v8': ^4.1.10
  acorn: ^8.17.0
  arktype: ^2.2.2
  eslint: ^9.39.4
  fast-check: ^4.8.0
  openai: ^6.45.0
  prettier: ^3.9.4
  publint: ^0.3.21
  tsdown: ^0.22.3
  turbo: ^2.10.3
  typescript: ~6.0.3
  typescript-eslint: ^8.63.0
  valibot: ^1.4.2
  vitest: ^4.1.10
  zod: ^4.4.3

minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.63.0'
  - '@typescript-eslint/parser@8.63.0'
  - '@typescript-eslint/project-service@8.63.0'
  - '@typescript-eslint/scope-manager@8.63.0'
  - '@typescript-eslint/tsconfig-utils@8.63.0'
  - '@typescript-eslint/type-utils@8.63.0'
  - '@typescript-eslint/types@8.63.0'
  - '@typescript-eslint/typescript-estree@8.63.0'
  - '@typescript-eslint/utils@8.63.0'
  - '@typescript-eslint/visitor-keys@8.63.0'
  - '@vitest/coverage-v8@4.1.10'
  - '@vitest/expect@4.1.10'
  - '@vitest/mocker@4.1.10'
  - '@vitest/pretty-format@4.1.10'
  - '@vitest/runner@4.1.10'
  - '@vitest/snapshot@4.1.10'
  - '@vitest/spy@4.1.10'
  - '@vitest/utils@4.1.10'
  - typescript-eslint@8.63.0
  - vitest@4.1.10

# VitePress 1.6.4 is its own latest and pins vite ^5.4.14, and the vite 5
# line carries four unpatched dev-server advisories (one high): the repairs
# land in vite 6.4.3 and esbuild 0.25, so there is no upstream fix to wait
# for. Nothing here ships: neither package appears in any publishable
# `dependencies`, so the exposure is a developer running the docs dev
# server, never a library user. Scoped to vitepress's subtree on purpose,
# so the test runner's own vite is untouched; vite 6 pulls the patched
# esbuild itself. Drop this the day VitePress ships on vite 6 or newer.
overrides:
  vitepress>vite: '^6.4.3'
